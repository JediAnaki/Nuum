apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: video-platform
data:
  SERVER_PORT: "8080"
  ENV: "development"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_USER: "postgres"
  DB_NAME: "video_platform"
  DB_SSL_MODE: "disable"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  STORAGE_PROVIDER: "minio"
  STORAGE_ENDPOINT: "minio-service:9000"
  STORAGE_BUCKET: "videos"
  STORAGE_REGION: "us-east-1"
  JWT_ACCESS_TTL: "15"
  JWT_REFRESH_TTL: "168"
