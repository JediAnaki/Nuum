apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: video-platform
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      initContainers:
      # Wait for PostgreSQL to be ready
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done;']
      # Wait for Redis to be ready
      - name: wait-for-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done;']
      containers:
      - name: worker
        image: video-platform-worker:latest
        imagePullPolicy: Never  # Use local image built by minikube
        envFrom:
        - configMapRef:
            name: worker-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DB_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: REDIS_PASSWORD
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: processed-videos
          mountPath: /app/processed_videos
        - name: thumbnails
          mountPath: /app/thumbnails
      volumes:
      - name: uploads
        emptyDir: {}
      - name: processed-videos
        emptyDir: {}
      - name: thumbnails
        emptyDir: {}
